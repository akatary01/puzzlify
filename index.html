<html>
<head>
    <title>puzzlify</title>
    <link rel="icon" href="assets/favicon.ico" />

    <link rel="stylesheet" href="assets/css/utils.css">
    <link rel="stylesheet" href="assets/css/vars/_theme.css">
    <link rel="stylesheet" href="assets/css/vars/_fonts.css">
    <link rel="stylesheet" href="assets/css/puzzilfy.css">

    <link rel="apple-touch-icon" href="assets/apple.png" />
    <script src="https://kit.fontawesome.com/51acc43a61.js" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <link rel="stylesheet" href="https://googleapis.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="<Eman loves Ahmed <3<3<3<3<3<3<3<3 and Ahmed loves Eman <3<3<3<3<3<3<3<3 >">
    <link href="https://fonts.googleapis.com/css2?family=Annie+Use+Your+Telescope&family=Barrio&display=swap" rel="stylesheet">
</head>
<body>  
    <nav>
        <a href="index.html" style="text-decoration: none;">                
            <h1 id="logo">Puzzilfy.</h1>
        </a>
            
    </nav>
<div id="root">
    <main class="flex column justify-center align-center width-100" style="height: 100%">
        
        <!-- puzzle board + text-->
        <div id="puzzle-board" class="flex align-center justify-center width-100">
             <h3 id="page-text">Turn your art into a jigsaw puzzle</h3>
            <!-- upload space -->
            <div class="upload-container" style="background-image: url(assets/cork_bg.png);">
                <label for="input-file" id="drop-area">
                    <div id="image-view" class="pointer">
                        <i class="fa-solid fa-upload"></i>
                        <p>Drag and drop your image</p>
                        <span>or click to upload</span>
                    </div>
                    <input id="input-file" type="file" accept="image/*" hidden>
                </label>
            </div>
            <!-- billy puzzle drawer -->
            <div class="flex align-center column" id="billys-drawer"  style="background-image:url(assets/cork_bg.png);">
                <div class="bubble-speech" >Will you put me back together again?</div>
                <img src="assets/billy_nips.png" id="billy">
                <img src="assets/billy_nips/cell_4_1.png" id="billys-piece-1">
                <img src="assets/billy_nips/cell_4_0.png" id="billys-piece-2">
                <img src="assets/billy_nips/cell_3_1.png" id="billys-piece-3">
                <img src="assets/billy_nips/cell_3_0.png" id="billys-piece-4">
            </div>
        </div>
        <!-- row and column input -->
        <form class="flex puzzle-shape" x-data="{ rows: 0, cols: 0 }" @submit.prevent="puzzlify(rows, cols)">
            <input x-model="rows" type="number" max="15" id="rows-input" class="puzzle-input" placeholder="no. rows">
            <input x-model="cols" type="number" max="15" id="cols-input" class="puzzle-input" placeholder="no. cols">
            <button type="submit">Puzzlify!</button>

        </form>
    
    </main>
    <script src="puzzlify.js"></script>       
</body>
</html>
