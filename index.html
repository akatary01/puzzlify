<html>
<head>
    <title>puzzlify</title>
    <link rel="icon" href="assets/favicon.ico" />

    <link rel="stylesheet" href="assets/css/utils.css">
    <link rel="stylesheet" href="assets/css/vars/_theme.css">
    <link rel="stylesheet" href="assets/css/vars/_fonts.css">
    <link rel="stylesheet" href="assets/css/puzzilfy.css">

    <link rel="apple-touch-icon" href="assets/apple.png" />
    <script src="https://kit.fontawesome.com/51acc43a61.js" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <link rel="stylesheet" href="https://googleapis.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="<Eman loves Ahmed <3<3<3<3<3<3<3<3 and Ahmed loves Eman <3<3<3<3<3<3<3<3 >">
    <link href="https://fonts.googleapis.com/css2?family=Annie+Use+Your+Telescope&family=Barrio&display=swap" rel="stylesheet">
</head>
<body class="flex justify-center">  
<div id="root">
    <nav > <a href="index.html" style="text-decoration: none; color: black;">
        <h1 id="logo">Puzzilfy.</h1></a>
        <h3 id="logo-subtitle">Turn your art into a puzzle</h3>
    </nav>
    
    <main class="flex justify-center align-center width-100" style="height: 100%">
        
        <div class="flex column align-center justify-center width-100 height-100">
            <div class="upload-container" style="background-image: url(assets/cork_bg.png); background-repeat: no-repeat">
                <label for="input-file" id="drop-area">
                    <div id="image-view" class="pointer">
                        <i class="fa-solid fa-upload"></i>
                        <p>Drag and drop your image</p>
                        <span>or click to upload</span>
                    </div>
                    <input id="input-file" type="file" accept="image/*" hidden>

                </label>
               
            </div>
            <div class="flex">
                <puzzle-piece x-data="{src: 'assets/puzzle_pieces/edge_1.svg', rotation: 10}"></puzzle-piece>
                <puzzle-piece x-data="{src: 'assets/puzzle_pieces/piece_1.svg', rotation: 25}"></puzzle-piece>
                <!-- <puzzle-piece x-data="{src: 'assets/puzzle_pieces/piece_2.svg', rotation: 50}"></puzzle-piece>
                <puzzle-piece x-data="{src: 'assets/puzzle_pieces/piece_3.svg', rotation: 50}"></puzzle-piece> -->
            </div>
        </div>
        <template id="puzzle-piece-template">
            <button class="puzzle-piece" >
                <img :src="src" :style="{width: '300px', height: '300px', transform: 'rotate(' + rotation + 'deg)'}">
            </button>
        </template>     
    </main>
    <script src="puzzlify.js"></script>       
</body>
</html>
